<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="32" height="32">
  <!-- Background circle for better visibility -->
  <circle cx="50" cy="50" r="48" fill="#1B1523" stroke="#6F3CC3" stroke-width="2"/>
  
  <!-- Beer Mugs -->
  <!-- Left Mug -->
  <g transform="translate(25, 35)">
    <!-- Mug body -->
    <rect x="0" y="8" width="12" height="20" fill="#FFC857" stroke="#4C1D95" stroke-width="2" rx="1"/>
    <!-- Foam -->
    <ellipse cx="6" cy="8" rx="6" ry="4" fill="#FFF7E6" stroke="#4C1D95" stroke-width="2"/>
    <!-- Handle -->
    <path d="M12 10 Q16 12 16 16 Q16 20 12 22" fill="none" stroke="#4C1D95" stroke-width="2"/>
    <!-- Beer lines -->
    <line x1="3" y1="12" x2="3" y2="24" stroke="#4C1D95" stroke-width="1"/>
    <line x1="9" y1="12" x2="9" y2="24" stroke="#4C1D95" stroke-width="1"/>
  </g>
  
  <!-- Right Mug -->
  <g transform="translate(55, 35)">
    <!-- Mug body -->
    <rect x="0" y="8" width="12" height="20" fill="#FFC857" stroke="#4C1D95" stroke-width="2" rx="1"/>
    <!-- Foam -->
    <ellipse cx="6" cy="8" rx="6" ry="4" fill="#FFF7E6" stroke="#4C1D95" stroke-width="2"/>
    <!-- Handle -->
    <path d="M0 10 Q-4 12 -4 16 Q-4 20 0 22" fill="none" stroke="#4C1D95" stroke-width="2"/>
    <!-- Beer lines -->
    <line x1="3" y1="12" x2="3" y2="24" stroke="#4C1D95" stroke-width="1"/>
    <line x1="9" y1="12" x2="9" y2="24" stroke="#4C1D95" stroke-width="1"/>
  </g>
  
  <!-- Clink lines -->
  <g stroke="#A78BFA" stroke-width="1" opacity="0.8">
    <line x1="42" y1="40" x2="45" y2="35"/>
    <line x1="42" y1="45" x2="47" y2="40"/>
    <line x1="42" y1="50" x2="45" y2="55"/>
    <line x1="58" y1="40" x2="55" y2="35"/>
    <line x1="58" y1="45" x2="53" y2="40"/>
    <line x1="58" y1="50" x2="55" y2="55"/>
  </g>
  
  <!-- Heart -->
  <g transform="translate(45, 25)">
    <path d="M5 8 C5 4, 8 2, 10 4 C12 2, 15 4, 15 8 C15 12, 10 16, 10 16 C10 16, 5 12, 5 8 Z" fill="#FFF7E6" stroke="#4C1D95" stroke-width="1.5"/>
  </g>
</svg>